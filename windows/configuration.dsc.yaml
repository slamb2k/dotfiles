# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
#
# Windows dev box restoration — WinGet Configuration (DSC v3 / configuration-dsc-schema 0.2)
#
# Usage (from an elevated PowerShell on a fresh Windows install):
#   winget configure --file .\windows\configuration.dsc.yaml --accept-configuration-agreements
#
# Generated by inspecting the live machine (Windows 11 Pro, build 26200, en-AU).
# Includes:
#   * Optional Windows features that were enabled
#   * Developer-mode / long-paths / explorer / dark-mode toggles
#   * Active power plan (High performance)
#   * All WinGet packages (winget + msstore sources)
#   * WSL distros and ~/.wslconfig
#   * VS Code extensions
#   * PowerShell modules used by the pwsh profile
#   * Per-user PATH additions for Bun + .local\bin
#
# Things this file CANNOT restore automatically (review separately):
#   * Tailscale login / device key
#   * Docker Desktop login + WSL distro internals (manage with stow inside the distro)
#   * SSH keys, GPG keys, Keeper / 1Password sessions
#   * Microsoft / Apple / Google / GitHub account sign-ins
#   * Windows Hello (face / fingerprint enrollment)
#   * Application licences (AIDA64, Audient EVO drivers etc.)
#   * Wallpaper, taskbar pin order, Start menu layout
#
properties:
  configurationVersion: 0.2.0

  # ---------------------------------------------------------------------------
  # Assertions — preconditions that must hold before any resource runs
  # ---------------------------------------------------------------------------
  assertions:
    - resource: Microsoft.Windows.Developer/OsVersion
      id: minOs
      directives:
        description: Require Windows 11 22000 or newer
        allowPrerelease: true
      settings:
        MinVersion: '10.0.22000'

  resources:

    # =========================================================================
    # Windows optional features (via dism.exe — sidesteps the
    # PSDscResources/WindowsOptionalFeature "Class not registered" bug under
    # pwsh 7, which is what `winget configure` runs DSC in)
    # =========================================================================
    - resource: PSDscResources/Script
      id: featureWSL
      directives:
        description: Enable Windows Subsystem for Linux
        allowPrerelease: true
      settings:
        GetScript: |
          $r = & dism.exe /online /Get-FeatureInfo /FeatureName:Microsoft-Windows-Subsystem-Linux 2>$null
          return @{ Result = ($r -join "`n") }
        TestScript: |
          $r = & dism.exe /online /Get-FeatureInfo /FeatureName:Microsoft-Windows-Subsystem-Linux 2>$null
          return ($r -match 'State\s*:\s*Enabled').Count -gt 0
        SetScript: |
          & dism.exe /online /Enable-Feature /FeatureName:Microsoft-Windows-Subsystem-Linux /All /NoRestart | Out-Null

    - resource: PSDscResources/Script
      id: featureVMP
      directives:
        description: Enable Virtual Machine Platform (required for WSL2 + Docker Desktop)
        allowPrerelease: true
      settings:
        GetScript: |
          $r = & dism.exe /online /Get-FeatureInfo /FeatureName:VirtualMachinePlatform 2>$null
          return @{ Result = ($r -join "`n") }
        TestScript: |
          $r = & dism.exe /online /Get-FeatureInfo /FeatureName:VirtualMachinePlatform 2>$null
          return ($r -match 'State\s*:\s*Enabled').Count -gt 0
        SetScript: |
          & dism.exe /online /Enable-Feature /FeatureName:VirtualMachinePlatform /All /NoRestart | Out-Null

    # SmbDirect was enabled on the source machine — useful for high-throughput SMB
    - resource: PSDscResources/Script
      id: featureSmbDirect
      directives:
        description: Enable SMB Direct (RDMA)
        allowPrerelease: true
      settings:
        GetScript: |
          $r = & dism.exe /online /Get-FeatureInfo /FeatureName:SmbDirect 2>$null
          return @{ Result = ($r -join "`n") }
        TestScript: |
          $r = & dism.exe /online /Get-FeatureInfo /FeatureName:SmbDirect 2>$null
          return ($r -match 'State\s*:\s*Enabled').Count -gt 0
        SetScript: |
          & dism.exe /online /Enable-Feature /FeatureName:SmbDirect /All /NoRestart | Out-Null

    # =========================================================================
    # Developer / Explorer / theme settings
    # =========================================================================
    - resource: Microsoft.Windows.Developer/DeveloperMode
      id: devMode
      directives:
        description: Enable Developer Mode
        allowPrerelease: true
      settings:
        Ensure: Present

    - resource: Microsoft.Windows.Developer/EnableLongPathSupport
      id: longPaths
      directives:
        description: Enable Win32 long-path support (LongPathsEnabled=1)
        allowPrerelease: true
      settings:
        Ensure: Present

    - resource: Microsoft.Windows.Developer/EnableDarkMode
      id: darkMode
      directives:
        description: Apps + system dark theme
        allowPrerelease: true
      settings:
        Ensure: Present
        RestartExplorer: true

    - resource: Microsoft.Windows.Developer/ShowFileExtensions
      id: fileExt
      directives:
        description: Show file extensions in Explorer
        allowPrerelease: true
      settings:
        Ensure: Present
        RestartExplorer: true

    - resource: Microsoft.Windows.Developer/ShowHiddenFiles
      id: hiddenFiles
      directives:
        description: Show hidden files in Explorer
        allowPrerelease: true
      settings:
        Ensure: Present
        RestartExplorer: true

    - resource: Microsoft.Windows.Developer/TaskbarAlignment
      id: taskbarAlign
      directives:
        description: Taskbar left-aligned (set Middle if you prefer)
        allowPrerelease: true
      settings:
        Alignment: Left

    # =========================================================================
    # Power plan — High performance
    # =========================================================================
    - resource: PSDscResources/Script
      id: powerPlanHighPerf
      directives:
        description: Activate the built-in High performance power scheme
        allowPrerelease: true
      settings:
        GetScript: |
          $active = (powercfg /getactivescheme) -replace '.*\(([^)]+)\).*','$1'
          return @{ Result = $active }
        TestScript: |
          $scheme = powercfg /getactivescheme
          return $scheme -match '8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'
        SetScript: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

