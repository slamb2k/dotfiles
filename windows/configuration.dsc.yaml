      settings: { id: Microsoft.DotNet.Native.Runtime, source: winget, installMode: silent }

    # =========================================================================
    # WSL — install Ubuntu (default), keep Ubuntu-Test as a scratch distro,
    # and write the host-side ~/.wslconfig.
    # The internal contents of each distro are managed by stow inside WSL.
    # =========================================================================
    - resource: PSDscResources/Script
      id: wslInstallUbuntu
      directives:
        description: Install the default Ubuntu WSL distro (no auto-launch)
        allowPrerelease: true
      dependsOn:
        - featureWSL
        - featureVMP
        - pkgWSL
      settings:
        GetScript: |
          $list = & wsl.exe --list --quiet 2>$null
          return @{ Result = ($list -join ',') }
        TestScript: |
          $list = & wsl.exe --list --quiet 2>$null
          return ($list -match '^Ubuntu$').Count -gt 0
        SetScript: |
          & wsl.exe --install -d Ubuntu --no-launch

    - resource: PSDscResources/Script
      id: wslInstallUbuntuTest
      directives:
        description: Optional second Ubuntu distro for experiments
        allowPrerelease: true
      dependsOn:
        - wslInstallUbuntu
      settings:
        GetScript: |
          $list = & wsl.exe --list --quiet 2>$null
          return @{ Result = ($list -join ',') }
        TestScript: |
          $list = & wsl.exe --list --quiet 2>$null
          return ($list -match '^Ubuntu-Test$').Count -gt 0
        SetScript: |
          & wsl.exe --install -d Ubuntu --name Ubuntu-Test --no-launch

    - resource: PSDscResources/Script
      id: wslConfigFile
      directives:
        description: Write %UserProfile%\.wslconfig (mirrored networking, 8 GB cap, gradual reclaim)
        allowPrerelease: true
      settings:
        GetScript: |
          $p = Join-Path $env:USERPROFILE '.wslconfig'
          return @{ Result = (Test-Path $p) }
        TestScript: |
          $p = Join-Path $env:USERPROFILE '.wslconfig'
          if (-not (Test-Path $p)) { return $false }
          (Get-Content $p -Raw) -match 'networkingMode=mirrored' -and `
          (Get-Content $p -Raw) -match 'memory=8GB'
        SetScript: |
          $lines = @(
            '[wsl2]',
            'memory=8GB',
            'networkingMode=mirrored',
            'dnsTunneling=true',
            'autoProxy=true',
            'firewall=true',
            'maxCrashDumpCount=5',
            '',
            '[experimental]',
            'autoMemoryReclaim=gradual',
            'sparseVhd=true'
          )
          $p = Join-Path $env:USERPROFILE '.wslconfig'
          Set-Content -Path $p -Value $lines -Encoding UTF8

    # =========================================================================
    # PowerShell modules used by the pwsh profile (PSReadLine pin + gsudoModule)
    # =========================================================================
    - resource: PSDscResources/Script
      id: psModules
      directives:
        description: Install pwsh modules — PSReadLine (predictive), Terminal-Icons, posh-git
        allowPrerelease: true
      dependsOn:
        - pkgPwsh
      settings:
        GetScript: |
          return @{ Result = (Get-Module -ListAvailable PSReadLine,Terminal-Icons,posh-git | Select-Object -ExpandProperty Name) -join ',' }
        TestScript: |
          $needed = 'PSReadLine','Terminal-Icons','posh-git'
          foreach ($m in $needed) {
            if (-not (Get-Module -ListAvailable $m)) { return $false }
          }
          return $true
        SetScript: |
          # SetScript runs under pwsh 7 (winget configure's DSC engine), so we
          # can call Install-Module directly. Re-invoking pwsh.exe via & inside
          # a DSC Script trips ".NET StandardOutputEncoding is only supported
          # when standard output is redirected" because PowerShell's call
          # operator sets the encoding without forcing the matching redirect.
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
          foreach ($m in 'PSReadLine','Terminal-Icons','posh-git') {
              try {
                  Install-Module -Name $m -Force -SkipPublisherCheck -AllowClobber -Scope CurrentUser -Repository PSGallery -ErrorAction Stop
              } catch {
                  Write-Warning "Failed to install module $m`: $_"
              }
          }

    # =========================================================================
    # VS Code extensions (bulk install via `code --install-extension`)
    # =========================================================================
    - resource: PSDscResources/Script
      id: vscodeExtensions
      directives:
        description: Install VS Code extensions used on the source machine
        allowPrerelease: true
      dependsOn:
        - pkgVSCode
      settings:
        GetScript: |
          $cmd = (Get-Command code -ErrorAction SilentlyContinue)?.Source
          if ($cmd) { return @{ Result = (& $cmd --list-extensions) -join ',' } }
          return @{ Result = '' }
        TestScript: |
          # Always run; idempotent (--force re-installs are no-ops at parity)
          return $false
        SetScript: |
          $exts = @(
            'aaron-bond.better-comments',
            'alexandersklarmsft.midl3-language-server',
            'alexcvzz.vscode-sqlite',
            'davidanson.vscode-markdownlint',
            'davidmarek.jsonpath-extract',
            'dbaeumer.vscode-eslint',
            'eamodio.gitlens',
            'emeraldwalk.runonsave',
            'esbenp.prettier-vscode',
            'formulahendry.github-actions',
            'github.codespaces',
            'github.github-vscode-theme',
            'github.vscode-github-actions',
            'github.vscode-pull-request-github',
            'jock.svg',
            'kevinrose.vsc-python-indent',
            'lukas-tr.materialdesignicons-intellisense',
            'marimo-team.vscode-marimo',
            'mechatroner.rainbow-csv',
            'ms-azuretools.vscode-azureresourcegroups',
            'ms-azuretools.vscode-containers',
            'ms-azuretools.vscode-docker',
            'ms-dotnettools.vscode-dotnet-runtime',
            'ms-playwright.playwright',
            'ms-python.black-formatter',
            'ms-python.debugpy',
            'ms-python.pylint',
            'ms-python.python',
            'ms-python.vscode-pylance',
            'ms-semantic-kernel.semantic-kernel',
            'ms-toolsai.jupyter',
            'ms-toolsai.jupyter-keymap',
            'ms-toolsai.jupyter-renderers',
            'ms-vscode-remote.remote-ssh',
            'ms-vscode-remote.remote-ssh-edit',
            'ms-vscode-remote.remote-wsl',
            'ms-vscode-remote.vscode-remote-extensionpack',
            'ms-vscode.makefile-tools',
            'ms-vscode.powershell',
            'rangav.vscode-thunder-client',
            'redhat.vscode-yaml',
            'rogalmic.bash-debug',
            'rust-lang.rust-analyzer',
            'timonwong.shellcheck',
            'usernamehw.errorlens'
          )
          $code = (Get-Command code -ErrorAction SilentlyContinue)?.Source
          if (-not $code) { throw 'VS Code "code" command not on PATH yet — sign out and back in, then re-run.' }
          foreach ($e in $exts) { & $code --install-extension $e --force }

    # =========================================================================
    # Per-user PATH additions seen on the source machine
    # =========================================================================
    - resource: PSDscResources/Environment
      id: pathBunBin
      directives:
        description: Add %USERPROFILE%\.bun\bin to user PATH (Bun runtime)
        allowPrerelease: true
      settings:
        Name: Path
        Value: '%USERPROFILE%\.bun\bin'
        Ensure: Present
        Path: true
        Target: Process

    - resource: PSDscResources/Environment
      id: pathLocalBin
      directives:
        description: Add %USERPROFILE%\.local\bin to user PATH (uv tools, pipx, etc.)
        allowPrerelease: true
      settings:
        Name: Path
        Value: '%USERPROFILE%\.local\bin'
        Ensure: Present
        Path: true
        Target: Process

