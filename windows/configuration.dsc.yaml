    # metadata isn't provisioned). On a real machine these install identically;
    # only difference is they self-update instead of Store-update.
    # Original msstore IDs preserved in comments in case you want to switch back.
    # =========================================================================
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkgVSCode
      directives: { description: Visual Studio Code, allowPrerelease: true }
      settings: { id: Microsoft.VisualStudioCode, source: winget, installMode: silent }   # was msstore XP9KHM4BK9FZ7Q

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkgPowerToys
      directives: { description: Microsoft PowerToys, allowPrerelease: true }
      settings: { id: Microsoft.PowerToys, source: winget, installMode: silent }          # was msstore XP89DCGQ3K6VLD

