# claude-statusline configuration
# Docs: https://github.com/felipeelias/claude-statusline
# Managed in dotfiles (Stow package: claude-statusline). Preview presets with
# `claude-statusline themes`; validate edits with `claude-statusline test`.

# Custom theme tuned for readability on a dark terminal: bold near-white text on
# solid, dark segment backgrounds, no pipes. The first block runs flush to the
# left wall. Each block's rounded right cap (U+E0B4) is filled with that block's
# colour and painted OVER the next block's background, giving a continuous
# scalloped powerline; the last cap sits on the terminal background. The context
# bar uses a hatched-square fill (U+25A8) / hollow-square empty (U+25A2) so it
# reads as a textured material rather than a plain block. Built on tokyo-night
# so the module CONTENT formats (git icon, padding, context bar, model name) are
# inherited; only the layout and colours are overridden.
#
# $cost is intentionally NOT in this format. claude-statusline (v0.9.0) has no
# module that can source arbitrary external data (e.g. a project's LOGBOOK.md
# follow-ups count), so that's done by a wrapper script instead of this config
# — see statusline-logbook-wrapper.sh in this same package, wired up via
# ~/.claude/settings.json's statusLine.command. The wrapper calls this binary
# for the base render, then appends a themed segment reusing the amber shade
# freed up here. If claude-statusline ever ships a custom_command module
# (on their roadmap), replace the wrapper with a native [logbook] module.
preset = "tokyo-night"

format = "$directory[](fg:#1e3a8a bg:#134e4a)$git_branch[](fg:#134e4a bg:#312e81)$model[](fg:#312e81 bg:#9a3412)$context[](fg:#9a3412)"

[directory]
style = "fg:#ffffff bg:#1e3a8a bold"

[git_branch]
style = "fg:#ffffff bg:#134e4a"

[model]
format = " ⬡ {{.DisplayName}} "
style = "fg:#ffffff bg:#312e81 bold"

[context]
style = "fg:#ffffff bg:#9a3412"
bar_width = 10
bar_fill = "▨"
bar_empty = "▢"
