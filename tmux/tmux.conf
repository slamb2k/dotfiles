# ===========================================================================>
# tmux.conf — clean config with sane defaults + Catppuccin
# ===========================================================================>

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough off

# True colour support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g extended-keys on
set -g extended-keys-format csi-u
set -ga terminal-features 'xterm*:extkeys'
# Bracketed paste passes through by default in tmux 2.6+, but force it:
set -g allow-passthrough on

# Pane styling — borderless cockpit
# Header visibility is controlled by the final override at the bottom of this file.
set -g pane-border-lines single
set -g pane-border-style fg=#05070a,bg=#05070a
set -g pane-active-border-style fg=#05070a,bg=#05070a

# Use one seamless background so tmux pane separators disappear.
# Inactive panes are still softened by dimmer foreground text.
set -g window-active-style bg=#05070a
set -g window-style bg=#05070a,fg=#8b8fa3

# Copy-mode / popup accents stay subtle and premium.
set -g mode-style fg=#cdd6f4,bg=#313244,bold
set -g popup-style fg=#cdd6f4,bg=#0b0d12
set -g popup-border-style fg=#45475a,bg=#0b0d12

# Title support
set -g set-titles on
set -g set-titles-string "#T"

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------

# Reload config and force pane headers back on in case a plugin/config changed them.
bind r source-file ~/.tmux.conf \; set -g pane-border-status top \; display "Config reloaded + pane headers restored"

# Intuitive splits (inherit current path)
bind-key '|' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
unbind-key '"'
unbind-key %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane switching (Alt+hjkl, no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes (Alt+Shift+hjkl, no prefix)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Kill pane without confirmation
bind x kill-pane

# Switch windows with Alt+number (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Cycle windows with Alt+[/]
bind -n M-[ previous-window
bind -n M-] next-window

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Toggle zoom
bind z resize-pane -Z

# ---------------------------------------------------------------------------
# Copy mode (vi style)
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Claude Code AI helpers (popups)
# ---------------------------------------------------------------------------
# <prefix> y — Toggle persistent Claude Code popup
#   Creates a background session per tmux session so the conversation
#   survives popup dismissal. Hit <prefix> y again to reopen.
bind -r y run-shell '\
  SESSION="claude-$(tmux display-message -p "#S")"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w85% -h85% -E "tmux attach-session -t $SESSION"'
 
# <prefix> e — Send last 500 lines of current pane to Claude for analysis
#   Useful when you see an error and want instant diagnosis without
#   copy-pasting. Opens a one-shot popup with the analysis.
bind e run-shell 'tmux capture-pane -p -S -100 > /tmp/tmux-pane-capture.txt' \; \
  display-popup -w85% -h85% -E 'CAPTURE_FILE=/tmp/tmux-pane-capture.txt ~/.claude/scripts/ccq-analyse.sh'

# <prefix> h — Quick system health check popup (one-shot)
bind h display-popup -w85% -h85% -E \
  '~/.claude/scripts/ccq.sh --label "Running health check..." "Run a quick health check on this system: disk, memory, CPU, recent errors in journalctl, network status, any zombie processes. Summarise findings."'

# <prefix> d - Detaches tmux
bind-key d detach-client

# <prefix> ? — Ask Claude a quick question (prompts for input)
bind ? command-prompt -p "Ask Claude:" \
  'display-popup -w85% -h85% -E "~/.claude/scripts/ccq.sh \"%%\""'

# ---------------------------------------------------------------------------
# Catppuccin theme
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background '#1d1d2d'
set -g @catppuccin_status_module_bg_color '#1d1d2d'
set -g @catppuccin_pane_background_color '#05070a'
set -g @catppuccin_window_text_color '#05070a'
set -g @catppuccin_window_current_text_color '#05070a'
set -g @catppuccin_window_status_style 'rounded'
set -g status-right-length 160
set -g status-left-length 100

# Centre badge: when tmux is running over SSH, show an SSH icon and the
# connection name (defaults to the remote hostname; override with
# TMUX_SSH_CONNECTION_NAME for a friendly alias). Applied as a final
# status-format override below so the window list remains left-aligned.
set -ga update-environment " SSH_CONNECTION SSH_CLIENT TMUX_SSH_CONNECTION_NAME"
set -g status-justify left

# Load Catppuccin before composing status-right so the module variables exist.
run '/home/slamb2k/.tmux/plugins/tmux/catppuccin.tmux'

# Custom Catppuccin RAM module backed by tmux-cpu's #{ram_percentage} format.
set -g @catppuccin_status_ram "#[fg=#94e2d5]#[fg=#11111b,bg=#94e2d5] #[fg=#cdd6f4,bg=#313244] #{ram_percentage}#[fg=#313244] "

# Status modules: application, CPU, RAM, session, uptime, battery.
# This must be set before TPM runs so tmux-cpu and tmux-battery can replace
# #{cpu_percentage}, #{ram_percentage}, and #{battery_percentage}.
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#[fg=#94e2d5]#[fg=#11111b,bg=#94e2d5] #[fg=#cdd6f4,bg=#1d1d2d] #{ram_percentage}#[fg=#1d1d2d] "
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#(/home/slamb2k/dotfiles/tmux/scripts/battery-when-discharging.sh)"

# ---------------------------------------------------------------------------
# TPM bootstrap (keep at very bottom)
# ---------------------------------------------------------------------------
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

# Final override after Catppuccin/TPM: make pane separators visible and add
# compact title bars above panes.
set -g pane-border-status top
set -g pane-border-format "#[fill=#1d1d2d]#[fg=#313244,bg=#fab387,bold] #{?#{m:*claude*,#{pane_current_command}},,#{?#{m:pi,#{pane_current_command}},,#{?#{m:python*,#{pane_current_command}},,#{?#{m:*vim,#{pane_current_command}},,#{?#{m:git*,#{pane_current_command}},,#{?#{m:node,#{pane_current_command}},,#{?#{m:bun,#{pane_current_command}},,#{?#{m:ssh,#{pane_current_command}},,#{?#{m:docker*,#{pane_current_command}},,}}}}}}}}} #{pane_current_command} #[fg=#fab387,bg=#1d1d2d,bold]  #{b:pane_current_path}#[align=right]#[fg=#94e2d5,bg=#1d1d2d]#(/home/slamb2k/dotfiles/tmux/scripts/git-info.sh '#{pane_current_path}')#[fg=#fab387,bg=#1d1d2d,bold]#{?pane_active,● Active,○} "
set -g pane-border-lines single
# fg=bg turns all border lines into a solid block. This style also paints the
# pane dividers and the 2 cells before the header text (tmux can't split
# them), so it stays on the bar colour, not the pane-number panel colour.
set -wg pane-border-style fg=#1d1d2d,bg=#1d1d2d
set -wg pane-active-border-style fg=#1d1d2d,bg=#1d1d2d
set -wg window-active-style bg=#05070a
set -wg window-style bg=#05070a,fg=#8b8fa3
set -g status-style bg=#1d1d2d,fg=#cdd6f4
# Put the real window list in status-left so it remains left-aligned, then use
# tmux's `absolute-centre` window-list slot solely for the TMUX centre badge.
# This keeps "1 pi" on the left and the TMUX badge centred on the full width.
set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-justify absolute-centre
set -g status-left-length 120
set -g status-left "  #{W:#[range=window|#{window_index}]#[fg=#bac2de#,bg=#313244#,bold] #{window_index} #{window_name} #[default]#[norange] ,#[range=window|#{window_index}]#[fg=#f9e2af#,bg=#313244#,bold] #{window_index} #{window_name} #[default]#[norange] }"
set -g window-status-separator ""
setw -g window-status-format ""
setw -g window-status-current-format "#[fg=#fab387#,bg=#1d1d2d]#[fg=#05070a#,bg=#fab387#,bold]  TMUX #[fg=#fab387#,bg=#1d1d2d]#[default]"
set -ag status-right "  "
