onboarding = false
[ui.toast]
delivery = "herdr"

[keys]
prefix = "ctrl+a"
split_vertical = "prefix+\\"

[ui]
show_agent_labels_on_pane_borders = true
# Attention queue: blocked/needs-attention agents sort to the top. Known
# tradeoff: clicking a done agent marks it seen and reshuffles it down.
agent_panel_sort = "priority"

[theme]
name = "tokyo-night"
auto_switch = false

[theme.custom]
# Bright attention colour — "needs attention"/blocked agents in the sidebar
# render with the `red` token (foreground only; herdr has no per-state bg).
red = "#ff2e63"
# Brighter selection bar: selected row + active row backgrounds.
surface0 = "#3d2f5e"
surface_dim = "#2a2140"

[experimental]
pane_history = false
